# .tmux.conf — modern, portable, themed Catppuccin Mocha to match WezTerm.
# Works standalone in any terminal (Terminal.app, ssh, etc.).

# ============================================================================
# Prefix
# ============================================================================
unbind C-b
set -g prefix `
bind ` send-prefix         # press backtick twice to send a literal backtick

# ============================================================================
# General
# ============================================================================
set -g mouse on
set -g history-limit 50000
set -g escape-time 10                # responsive ESC inside vim/emacs
set -g focus-events on               # so editors get focus notifications
set -g renumber-windows on           # 1..9 stays predictable when windows close
set -g base-index 1
setw -g pane-base-index 1

# True color + 256-color so Catppuccin renders correctly inside tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# ============================================================================
# Key bindings
# ============================================================================
# Splits (kept from prior config; new panes inherit cwd of current pane)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize panes
bind < resize-pane -L 10
bind > resize-pane -R 10
bind - resize-pane -D 10
bind + resize-pane -U 10

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick reload
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Copy mode — vi-style
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ============================================================================
# Visual polish — Catppuccin Mocha palette directly (avoids needing the
# theme plugin to load before colors apply).
# ============================================================================
# Colors
mocha_bg="#1e1e2e"
mocha_surface0="#313244"
mocha_surface1="#45475a"
mocha_surface2="#585b70"
mocha_text="#cdd6f4"
mocha_subtext1="#bac2de"
mocha_lavender="#b4befe"
mocha_mauve="#cba6f7"
mocha_overlay0="#6c7086"

# Pane borders: active in lavender, inactive in muted gray.
set -g pane-border-style "fg=$mocha_surface1"
set -g pane-active-border-style "fg=$mocha_lavender"
set -g pane-border-status off

# Status bar: slim 1-line, transparent feel.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "fg=$mocha_text,bg=$mocha_bg"

set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=$mocha_lavender,bold] #S #[fg=$mocha_overlay0]│ "
set -g status-right "#[fg=$mocha_overlay0]%a %d %b  #[fg=$mocha_mauve,bold]%H:%M "

# Window list: current window highlighted in lavender.
setw -g window-status-format         "#[fg=$mocha_overlay0] #I #W "
setw -g window-status-current-format "#[fg=$mocha_bg,bg=$mocha_lavender,bold] #I #W "
setw -g window-status-separator ""

# Message and command prompt
set -g message-style "fg=$mocha_bg,bg=$mocha_lavender,bold"
set -g message-command-style "fg=$mocha_text,bg=$mocha_surface0"

# Mode (copy mode, etc.)
setw -g mode-style "fg=$mocha_bg,bg=$mocha_mauve"

# ============================================================================
# Plugins via tpm
# ============================================================================
# Set explicitly so the install_plugins script works without an attached client.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect/Continuum — auto-save sessions every 15 min, restore on start.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Run tpm (must be the very last line)
if "test ! -d ~/.tmux/plugins/tpm" \
   "display 'Install tpm: see install.sh in the Configurations repo'"
run -b '~/.tmux/plugins/tpm/tpm'
